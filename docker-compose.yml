services:
  mysql:
    image: mysql:8.4
    container_name: saxo-mysql
    environment:
      MYSQL_DATABASE: saxo
      MYSQL_USER: saxo
      MYSQL_PASSWORD: saxo
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - saxo-mysql-data:/var/lib/mysql

volumes:
  saxo-mysql-data:
