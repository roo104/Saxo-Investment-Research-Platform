spring:
  # Optional local overrides (e.g. a dev Saxo token) live in ./application-local.yml, which is
  # gitignored. `optional:` means the app starts fine when the file is absent (CI/prod).
  config:
    import: "optional:file:./application-local.yml"
  application:
    name: saxo-investment-manager
  datasource:
    url: ${SAXO_DB_URL:jdbc:mysql://localhost:3306/saxo?createDatabaseIfNotExist=true}
    username: ${SAXO_DB_USER:unwire}
    password: ${SAXO_DB_PASSWORD:unwire}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  webflux:
    problemdetails:
      enabled: true

# Spring Boot 4 defaults server.shutdown to `graceful`, which waits for in-flight requests to
# finish before closing. Our SSE streaming endpoints (see StreamController) never complete on
# their own, so graceful shutdown blocks for the full timeout-per-shutdown-phase (30s) on every
# restart while a browser holds an EventSource open. Immediate shutdown closes them at once.
server:
  shutdown: immediate

# Saxo OpenAPI connection. Switch environments by setting SAXO_ENV to simulation|live and
# providing the matching token. Tokens are read from the environment, never committed.
saxo:
  environment: ${SAXO_ENV:simulation}
  simulation:
    token: ${SAXO_SIM_TOKEN:}
  live:
    token: ${SAXO_LIVE_TOKEN:}

# Fundamentals data source (live only — no mock/sample fallback). FMP_API_KEY is mandatory: the
# application fails to start without it. Free key at financialmodelingprep.com.
fundamentals:
  fmp:
    api-key: ${FMP_API_KEY:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    jp.saxo_investment_manager: INFO
